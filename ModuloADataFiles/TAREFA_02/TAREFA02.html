<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="TAREFA02.CSS">
    <title>Deslize para Revelar Código</title>

</head>

<body>
    <section>
        <p>Deslize para Revelar Código</p>
        <ul class="code">
            <li tabindex="0" class="digit">
                <span>0</span>
            </li>
            <li tabindex="0" class="digit">
                <span>1</span>
            </li>
            <li tabindex="0" class="digit">
                <span>2</span>
            </li>
            <li tabindex="0" class="digit">
                <span>3</span>
            </li>
            <li tabindex="0" class="digit">
                <span>4</span>
            </li>
            <li tabindex="0" class="digit">
                <span>5</span>
            </li>
        </ul>
    </section>

    <script>
        const spans = document.querySelectorAll('.code span');

        document.addEventListener('mousemove', (e) => {
            spans.forEach(span => {
                // Pega a posição do centro de cada span
                const rect = span.getBoundingClientRect();
                const spanX = rect.left + rect.width / 2;
                const spanY = rect.top + rect.height / 2;

                // Calcula a distância entre o mouse e o span usando Pitágoras
                const distX = e.clientX - spanX;
                const distY = e.clientY - spanY;
                const distance = Math.sqrt(distX * distX + distY * distY);

                // Define um raio de influência (ex: 200 pixels)
                const radius = 400;

                if (distance < radius) {
                    // Calcula o nível de proximidade (0 a 1)
                    const proximity = 1 - (distance / radius); // 1 é muito perto, 0 é longe

                    // Aplica os efeitos baseados na proximidade
                    const scale = 1 + (proximity * 1.5); // Aumenta até 2.5x
                    const blur = 10 - (proximity * 10);  // Diminui o blur até 0
                    const opacity = 0.5 + (proximity * 0.5); // Aumenta opacidade até 1

                    span.style.transform = `scale(${scale})`;
                    span.style.filter = `blur(${blur}px)`;
                    span.style.opacity = opacity;
                } else {
                    // Reset se estiver fora do raio
                    span.style.transform = `scale(1)`;
                    span.style.filter = `blur(10px)`;
                    span.style.opacity = 0.5;
                }
            });
        });</script>
</body>

</html>
